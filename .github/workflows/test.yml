# GitHub Actions workflow for running tests
# Uruchamia testy jednostkowe i E2E przy każdym pushu i pull requeście

name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ============================================
  # Testy jednostkowe i integracyjne (Vitest)
  # ============================================
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      # Krok 1: Pobierz kod z repozytorium
      - name: Checkout repository
        uses: actions/checkout@v4

      # Krok 2: Zainstaluj Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Krok 3: Zainstaluj zależności
      - name: Install dependencies
        run: npm ci

      # Krok 4: Uruchom testy jednostkowe z pokryciem kodu
      - name: Run unit tests with coverage
        run: npm run test:coverage

      # Krok 5: Zapisz raport pokrycia jako artefakt
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # ============================================
  # Testy E2E (Playwright)
  # ============================================
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    
    steps:
      # Krok 1: Pobierz kod z repozytorium
      - name: Checkout repository
        uses: actions/checkout@v4

      # Krok 2: Zainstaluj Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Krok 3: Zainstaluj zależności
      - name: Install dependencies
        run: npm ci

      # Krok 4: Zainstaluj przeglądarki Playwright
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Krok 5: Zbuduj aplikację (wymagane dla testów E2E)
      - name: Build application
        run: npm run build
        env:
          # Zmienne środowiskowe dla builda (placeholder values dla CI)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'http://localhost:54321' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'placeholder' }}

      # Krok 6: Uruchom testy E2E
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          # Playwright uruchomi aplikację automatycznie (webServer w playwright.config.ts)
          CI: true

      # Krok 7: Zapisz raport Playwright jako artefakt (przy błędach)
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  # ============================================
  # Linting (opcjonalnie)
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

